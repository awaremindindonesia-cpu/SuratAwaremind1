---
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
*{font-family:"Plus Jakarta Sans",sans-serif;box-sizing:border-box}
body{background:#f8fafc;margin:0;padding:0}
.qr-card{border:1.5px solid #e2e8f0;border-radius:12px;background:white;padding:11px;margin-bottom:7px;transition:box-shadow .2s;cursor:pointer}
.qr-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.btn-main{background:linear-gradient(135deg,#6d28d9,#ec4899);color:white;border:none;border-radius:11px;padding:9px;font-size:12px;font-weight:700;width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.btn-main:hover{opacity:.9;transform:translateY(-1px)}
.btn-main:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-sm{background:white;color:#475569;border:1.5px solid #e2e8f0;border-radius:9px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn-sm:hover{border-color:#94a3b8}
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.65);backdrop-filter:blur(4px);z-index:99;display:flex;align-items:center;justify-content:center}
.modal-box{background:white;border-radius:20px;padding:24px;width:310px;box-shadow:0 24px 60px rgba(0,0,0,.2)}
.skel{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:sk 1.5s infinite;border-radius:6px}
@keyframes sk{0%{background-position:-200% 0}100%{background-position:200% 0}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}
.err-card{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:11px;padding:10px 12px}
</style>
</head>
<body class="p-3">

<div class="flex items-center gap-2.5 mb-4">
  <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#6d28d9,#ec4899)">
    <i class="ph-bold ph-certificate text-white text-lg"></i>
  </div>
  <div class="flex-1">
    <p class="font-bold text-sm text-slate-800">QR Code — Sertifikat</p>
    <p class="text-xs text-slate-400">Sheet2 · Portal Verifikasi</p>
  </div>
  <div class="flex items-center gap-1.5">
    <span class="w-1.5 h-1.5 rounded-full bg-purple-500 inline-block" style="animation:pulse 2s infinite"></span>
    <span class="text-xs text-slate-400">Live</span>
  </div>
</div>

<button class="btn-main mb-4" onclick="load()" id="btnLoad">
  <i class="ph-bold ph-arrows-clockwise text-sm" id="icoLoad"></i>
  <span id="lblLoad">Muat Data Sertifikat</span>
</button>

<div id="errBox" class="hidden err-card flex items-start gap-2 mb-3">
  <i class="ph ph-warning-circle text-red-400 text-base flex-shrink-0"></i>
  <p class="text-red-700 text-xs" id="errMsg"></p>
</div>

<div id="statsBar" class="hidden flex items-center justify-between bg-white border border-slate-200 rounded-xl px-4 py-2.5 mb-3">
  <div class="flex items-center gap-2">
    <i class="ph ph-certificate text-purple-500 text-base"></i>
    <span class="text-slate-600 text-xs font-semibold">Total:</span>
    <span class="text-purple-600 font-bold text-sm" id="totCount">0</span>
  </div>
  <button onclick="dlAll()" id="btnDlAll" class="btn-sm text-xs">
    <i class="ph ph-download-simple text-sm"></i> Unduh Semua
  </button>
</div>

<div id="searchBox" class="hidden relative mb-3">
  <i class="ph ph-magnifying-glass text-slate-400 text-sm absolute left-3 top-1/2 -translate-y-1/2"></i>
  <input type="text" id="srch" oninput="filter(this.value)" placeholder="Cari ID, nama, kegiatan..."
    class="w-full pl-8 pr-3 py-2 text-xs border border-slate-200 rounded-xl bg-white outline-none focus:border-purple-400"/>
</div>

<div id="skel" class="hidden space-y-2 mb-3">
  <div class="qr-card"><div class="skel h-3 w-1/3 mb-2"></div><div class="skel h-2.5 w-2/3"></div></div>
  <div class="qr-card"><div class="skel h-3 w-1/4 mb-2"></div><div class="skel h-2.5 w-1/2"></div></div>
</div>

<div id="list" class="pb-4"></div>

<div id="modal" class="hidden modal-bg" onclick="closeMod(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="flex items-start justify-between mb-4">
      <div>
        <p class="font-bold text-base text-slate-800" id="mTitle">QR Code</p>
        <p class="text-xs text-slate-400 mt-0.5" id="mSub"></p>
      </div>
      <button onclick="closeMod()" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center">
        <i class="ph ph-x text-slate-500 text-sm"></i>
      </button>
    </div>
    <div class="flex justify-center mb-4">
      <img id="mImg" src="" alt="QR" class="w-52 h-52 rounded-xl border-2 border-purple-100 p-2 bg-white"/>
    </div>
    <div class="bg-slate-50 rounded-xl p-3 mb-4">
      <p class="text-xs text-slate-400 font-semibold mb-1">URL Verifikasi:</p>
      <p class="text-xs break-all text-slate-600 leading-relaxed" style="font-family:'JetBrains Mono',monospace" id="mUrl"></p>
    </div>
    <div class="flex gap-2">
      <a id="mOpen" href="#" target="_blank" class="flex-1 btn-sm justify-center no-underline text-xs">
        <i class="ph ph-arrow-square-out text-sm"></i> Buka
      </a>
      <a id="mDl" href="#" download class="flex-1 btn-main text-xs py-2 no-underline justify-center" style="border-radius:9px">
        <i class="ph-bold ph-download-simple text-sm"></i> Unduh QR
      </a>
    </div>
  </div>
</div>

<script>
var all=[];
function setLoad(on){
  document.getElementById('btnLoad').disabled=on;
  document.getElementById('icoLoad').className=on?'ph ph-circle-notch text-sm animate-spin':'ph-bold ph-arrows-clockwise text-sm';
  document.getElementById('lblLoad').textContent=on?'Memuat...':'Muat Ulang';
  document.getElementById('skel').classList.toggle('hidden',!on);
  if(on){document.getElementById('list').innerHTML='';document.getElementById('statsBar').classList.add('hidden');document.getElementById('searchBox').classList.add('hidden');}
}
function showErr(m){document.getElementById('errBox').classList.remove('hidden');document.getElementById('errMsg').textContent=m;}
function hideErr(){document.getElementById('errBox').classList.add('hidden');}
function load(){
  hideErr();setLoad(true);
  google.script.run
    .withSuccessHandler(function(r){
      setLoad(false);
      if(r.error){showErr(r.error);return;}
      all=r.data;
      document.getElementById('totCount').textContent=all.length;
      document.getElementById('statsBar').classList.remove('hidden');
      document.getElementById('searchBox').classList.remove('hidden');
      render(all);
    })
    .withFailureHandler(function(e){setLoad(false);showErr(e.message);})
    .getAllSertifData();
}
function render(data){
  var el=document.getElementById('list');el.innerHTML='';
  if(!data.length){el.innerHTML='<div class="text-center py-8 text-slate-400"><i class="ph ph-file-dashed text-4xl mb-2 block"></i><p class="text-xs">Tidak ada data</p></div>';return;}
  data.forEach(function(item,i){
    var qUrl='https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=10&data='+encodeURIComponent(item.url);
    var d=document.createElement('div');
    d.className='qr-card';
    d.innerHTML='<div class="flex items-start gap-3"><img src="'+qUrl+'" alt="QR" class="w-14 h-14 rounded-lg border border-slate-200 flex-shrink-0 bg-white"/>'
      +'<div class="flex-1 min-w-0"><span style="font-family:\'JetBrains Mono\',monospace;color:#7c3aed;font-size:11px;font-weight:700;background:#f5f3ff;padding:2px 6px;border-radius:4px">'+esc(item.id)+'</span>'
      +'<p class="text-slate-700 font-semibold text-xs leading-snug mt-1 truncate">'+esc(item.nama||'-')+'</p>'
      +'<p class="text-slate-400 text-xs truncate">'+esc(item.kegiatan||'-')+'</p></div>'
      +'<button onclick="openMod('+i+')" class="flex-shrink-0 w-8 h-8 rounded-lg bg-slate-100 hover:bg-purple-100 flex items-center justify-center"><i class="ph ph-magnifying-glass-plus text-slate-500 text-base"></i></button></div>';
    el.appendChild(d);
  });
}
function filter(q){
  if(!q.trim()){render(all);return;}
  var l=q.toLowerCase();
  render(all.filter(function(x){return(x.id+x.nama+x.kegiatan).toLowerCase().indexOf(l)!==-1;}));
}
function openMod(i){
  var item=all[i];
  var qUrl='https://api.qrserver.com/v1/create-qr-code/?size=400x400&margin=15&data='+encodeURIComponent(item.url);
  var dlUrl='https://api.qrserver.com/v1/create-qr-code/?size=800x800&margin=20&format=png&data='+encodeURIComponent(item.url);
  document.getElementById('mTitle').textContent='QR — '+item.id;
  document.getElementById('mSub').textContent=item.nama||'';
  document.getElementById('mImg').src=qUrl;
  document.getElementById('mUrl').textContent=item.url;
  document.getElementById('mOpen').href=item.url;
  document.getElementById('mDl').href=dlUrl;
  document.getElementById('mDl').download='QR_SERT_'+item.id+'.png';
  document.getElementById('modal').classList.remove('hidden');
}
function closeMod(e){if(!e||e.target===document.getElementById('modal'))document.getElementById('modal').classList.add('hidden');}
function dlAll(){
  if(!all.length)return;
  var btn=document.getElementById('btnDlAll');
  btn.innerHTML='<i class="ph ph-circle-notch text-sm animate-spin"></i> Membuka...';
  var d=0;
  all.forEach(function(item,i){
    setTimeout(function(){
      var url='https://api.qrserver.com/v1/create-qr-code/?size=800x800&margin=20&format=png&data='+encodeURIComponent(item.url);
      var a=document.createElement('a');a.href=url;a.download='QR_SERT_'+item.id+'.png';a.target='_blank';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      if(i===all.length-1)setTimeout(function(){btn.innerHTML='<i class="ph ph-download-simple text-sm"></i> Unduh Semua';},800);
    },d);d+=600;
  });
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
window.onload=function(){load();};
</script>
</body>
</html>
